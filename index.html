<!DOCTYPE html>
<html>
<head>
  <title>My VR Server Hub</title>
</head>

<body style="background:#111;color:white;font-family:Arial;text-align:center;">

<h1>My VR Server Hub</h1>

<p>Server ID:</p>
<pre id="server"></pre>

<p>Voice Channel ID:</p>
<pre id="voice"></pre>

<script>
fetch("config.json")
  .then(res => res.json())
  .then(data => {
    document.getElementById("server").innerText = data.serverId;
    document.getElementById("voice").innerText = data.voiceId;
  });
</script>

</body>
</html>
