<!DOCTYPE html>
<html>
<head>
  <title>VR Game Config</title>
</head>
<body style="background:black;color:white;font-family:Arial;text-align:center;">

<h1>VR Game Config</h1>
<p>Photon settings for the game</p>

<pre id="data">Loading...</pre>

<script>
fetch("config.json")
  .then(res => res.json())
  .then(data => {
    document.getElementById("data").innerText =
      "Photon App ID: " + data.photonAppId;
  });
</script>

</body>
</html>
